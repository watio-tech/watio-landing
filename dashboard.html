<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watio ⚡️ | Mission Control</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- FontAwesome (Reemplazo de Lucide Icons para entorno web) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Fuentes Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #09090b; 
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        #root { height: 100vh; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #00E5FF; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // MAPPING DE ICONOS (FontAwesome)
        // ==========================================
        const IconBase = ({ name, size = 16, className = '' }) => (
            <i className={`fas ${name} ${className}`} style={{ fontSize: size, width: size, textAlign: 'center' }}></i>
        );
        const Zap = (p) => <IconBase name="fa-bolt" {...p} />;
        const Activity = (p) => <IconBase name="fa-chart-line" {...p} />;
        const Server = (p) => <IconBase name="fa-server" {...p} />;
        const LayoutDashboard = (p) => <IconBase name="fa-border-all" {...p} />;
        const Search = (p) => <IconBase name="fa-search" {...p} />;
        const DollarSign = (p) => <IconBase name="fa-dollar-sign" {...p} />;
        const Users = (p) => <IconBase name="fa-users" {...p} />;
        const TrendingUp = (p) => <IconBase name="fa-arrow-trend-up" {...p} />;
        const CreditCard = (p) => <IconBase name="fa-credit-card" {...p} />;
        const History = (p) => <IconBase name="fa-clock-rotate-left" {...p} />;
        const AlertTriangle = (p) => <IconBase name="fa-triangle-exclamation" {...p} />;
        const ShieldCheck = (p) => <IconBase name="fa-shield-halved" {...p} />;
        const Sun = (p) => <IconBase name="fa-sun" {...p} />;
        const Moon = (p) => <IconBase name="fa-moon" {...p} />;
        const Building2 = (p) => <IconBase name="fa-building" {...p} />;
        const CheckCircle2 = (p) => <IconBase name="fa-circle-check" {...p} />;
        const Clock = (p) => <IconBase name="fa-clock" {...p} />;
        const LogOut = (p) => <IconBase name="fa-right-from-bracket" {...p} />;
        const ChevronDown = (p) => <IconBase name="fa-chevron-down" {...p} />;
        const XCircle = (p) => <IconBase name="fa-circle-xmark" {...p} />;

        const API_URL = "https://clyzvtui3ku7dbwocuz7zjmnxe0vrdlg.lambda-url.sa-east-1.on.aws/";

        // ==========================================
        // 🏆 GOLDEN DATASET (SÃO PAULO - DEMO)
        // ==========================================
        const MOCK_DEMO_DATA = {
          stats: { total_revenue: 18450.25, total_sessions: 1240, total_wh: 4850000 },
          chargers: [
            { id: 'BR-SP-LUMI-01', org_name: 'Edifício Lumiere Itaim', vendor: 'WatioTech', model: 'V1-Pro Wallbox', status: 'Charging', last_heartbeat: new Date().toISOString() },
            { id: 'BR-SP-LUMI-02', org_name: 'Edifício Lumiere Itaim', vendor: 'WatioTech', model: 'V1-Pro Wallbox', status: 'Available', last_heartbeat: new Date().toISOString() },
            { id: 'BR-SP-VITRA-01', org_name: 'Condomínio Vitra', vendor: 'WEG', model: 'WEMOB Parking', status: 'Available', last_heartbeat: new Date(Date.now() - 15000).toISOString() },
            { id: 'BR-SP-VITRA-02', org_name: 'Condomínio Vitra', vendor: 'WEG', model: 'WEMOB Parking', status: 'Faulted', last_heartbeat: new Date(Date.now() - 3600000).toISOString() },
            { id: 'BR-RJ-LEBLON-01', org_name: 'Shopping Leblon', vendor: 'Intelbras', model: 'CVE City', status: 'Occupied', last_heartbeat: new Date().toISOString() },
            { id: 'BR-RJ-LEBLON-02', org_name: 'Shopping Leblon', vendor: 'Intelbras', model: 'CVE City', status: 'Available', last_heartbeat: new Date().toISOString() },
          ],
          usersList: [
            { name: 'Dr. Roberto Castello', email: 'demo1@watio.br', unit: 'Síndico • Lumiere', status: 'Active', rfids: 2, balance: 'R$ 0.00' },
            { name: 'Fernanda Lima Costa', email: 'demo2@watio.br', unit: 'Lumiere • Apto 42', status: 'Active', rfids: 1, balance: 'R$ -34.50' },
            { name: 'Carlos Eduardo Souza', email: 'demo3@watio.br', unit: 'Vitra • Apto 101', status: 'Active', rfids: 1, balance: 'R$ 0.00' },
            { name: 'Marina Ruy Barbosa', email: 'demo4@watio.br', unit: 'Vitra • Cobertura', status: 'Active', rfids: 2, balance: 'R$ 150.00' },
            { name: 'Gustavo Oliveira', email: 'demo5@watio.br', unit: 'Lumiere • Apto 15', status: 'Active', rfids: 1, balance: 'R$ -12.20' },
            { name: 'Patricia Abravanel', email: 'demo6@watio.br', unit: 'Lumiere • Apto 88', status: 'Active', rfids: 1, balance: 'R$ 45.00' },
            { name: 'Vaga Visitante 01', email: 'demo7@watio.br', unit: 'Condomínio Vitra', status: 'Active', rfids: 3, balance: 'R$ -112.00' },
            { name: 'Frota Sedex SP', email: 'demo8@watio.br', unit: 'Logística Centro', status: 'Active', rfids: 8, balance: 'R$ -1.450,20' },
            { name: 'Marcelo Rezende', email: 'demo9@watio.br', unit: 'Lumiere • Apto 12', status: 'Blocked', rfids: 0, balance: 'R$ -245.80' },
            { name: 'Ana Paula Padrão', email: 'demo10@watio.br', unit: 'Lumiere • Apto 31', status: 'Active', rfids: 1, balance: 'R$ 0.00' },
          ],
          records: [
            { id: 'TRX-10900', user: 'Fernanda Lima Costa', unit: 'Apto 42', kwh: 22.5, amount: 27.00, start: 'Agora mesmo', duration: 'Em curso', status: 'CHARGING', gateway: 'PIX' },
            { id: 'TRX-10899', user: 'Frota Sedex SP', unit: 'Logística', kwh: 85.0, amount: 102.00, start: 'Hoje 14:30', duration: '4h 20m', status: 'PAID', gateway: 'Faturado' },
            { id: 'TRX-10898', user: 'Marina Ruy Barbosa', unit: 'Cobertura', kwh: 45.0, amount: 54.00, start: 'Hoje 09:00', duration: '3h 10m', status: 'PAID', gateway: 'Saldo App' },
            { id: 'TRX-10897', user: 'Dr. Roberto Castello', unit: 'Síndico', kwh: 12.2, amount: 14.64, start: 'Hoje 07:15', duration: '1h 05m', status: 'PAID', gateway: 'PIX' },
            { id: 'TRX-10896', user: 'Carlos Eduardo Souza', unit: 'Apto 101', kwh: 18.0, amount: 21.60, start: 'Ontem 22:00', duration: '2h 45m', status: 'PAID', gateway: 'Stripe' },
            { id: 'TRX-10895', user: 'Ana Paula Padrão', unit: 'Apto 31', kwh: 35.2, amount: 42.24, start: 'Ontem 19:30', duration: '4h 00m', status: 'PAID', gateway: 'PIX' },
            { id: 'TRX-10894', user: 'Vaga Visitante 01', unit: 'Portaria', kwh: 15.0, amount: 18.00, start: 'Ontem 14:00', duration: '2h 00m', status: 'PAID', gateway: 'Boleto' },
            { id: 'TRX-10893', user: 'Gustavo Oliveira', unit: 'Apto 15', kwh: 10.1, amount: 12.12, start: 'Ontem 08:00', duration: '1h 15m', status: 'PAID', gateway: 'PIX' },
          ],
          rfids: [
            { tag: 'A1:B2:C3:D4', user: 'Dr. Roberto Castello', assigned: '10/01/2026', status: 'Active' },
            { tag: 'E5:F6:G7:H8', user: 'Fernanda Lima Costa', assigned: '15/02/2026', status: 'Active' },
            { tag: '9I:0J:1K:2L', user: 'Carlos Eduardo Souza', assigned: '01/03/2026', status: 'Active' },
            { tag: 'FF:EE:DD:CC', user: 'Frota Sedex SP (Master)', assigned: '20/02/2026', status: 'Active' },
            { tag: '00:11:22:33', user: 'Marcelo Rezende (Perdido)', assigned: '05/12/2025', status: 'Revoked' },
          ]
        };

        function App() {
          const [isLoggedIn, setIsLoggedIn] = useState(false);
          const [userEmail, setUserEmail] = useState("");
          const [isDemoMode, setIsDemoMode] = useState(false);
          
          const [data, setData] = useState({ 
            chargers: [], stats: { total_revenue: 0, total_sessions: 0, total_wh: 0 }, records: [], usersList: [], rfids: []
          });
          const [loading, setLoading] = useState(true);
          const [searchTerm, setSearchTerm] = useState("");
          const [activeTab, setActiveTab] = useState("dashboard");
          const [isDark, setIsDark] = useState(true);

          const fetchData = async (demoFlag) => {
            setLoading(true);
            
            if (demoFlag) {
              setTimeout(() => { 
                  setData(MOCK_DEMO_DATA); 
                  setLoading(false); 
              }, 800);
              return;
            }

            try {
              const response = await fetch(API_URL);
              const json = await response.json();
              setData({
                chargers: json.chargers || [],
                stats: json.stats || { total_revenue: 0, total_sessions: 0, total_wh: 0 },
                records: json.records || [],
                usersList: json.usersList || [],
                rfids: json.rfids || []
              });
            } catch (err) {
              console.error("Erro ao obter dados reais:", err);
            } finally {
              setLoading(false);
            }
          };

          useEffect(() => {
            if (isLoggedIn) {
              fetchData(isDemoMode);
              if (!isDemoMode) {
                const interval = setInterval(() => fetchData(false), 15000); 
                return () => clearInterval(interval);
              }
            }
          }, [isLoggedIn, isDemoMode]);

          const handleLogin = (e) => {
            e.preventDefault();
            const isDemo = userEmail.toLowerCase().includes("demo");
            setIsDemoMode(isDemo);
            setIsLoggedIn(true);
          };

          if (!isLoggedIn) {
            return <LoginScreen setEmail={setUserEmail} onLogin={handleLogin} />;
          }

          const theme = {
            bgMain: isDark ? "bg-[#09090b]" : "bg-[#f4f4f5]",
            bgSidebar: isDark ? "bg-[#09090b]" : "bg-[#ffffff]",
            bgCard: isDark ? "bg-[#18181b]" : "bg-white",
            bgTableHead: isDark ? "bg-[#09090b]" : "bg-zinc-50",
            borderBase: isDark ? "border-zinc-800/80" : "border-zinc-200",
            textMain: isDark ? "text-zinc-100" : "text-zinc-900",
            textSub: isDark ? "text-zinc-400" : "text-zinc-600",
            textMuted: isDark ? "text-zinc-500" : "text-zinc-400",
            hoverBg: isDark ? "hover:bg-zinc-800/50" : "hover:bg-zinc-100",
            inputBg: isDark ? "bg-zinc-900/50" : "bg-zinc-100",
          };

          return (
            <div className={`min-h-screen ${theme.bgMain} flex overflow-hidden transition-colors duration-300 font-sans`}>
              
              {/* SIDEBAR */}
              <aside className={`w-[260px] border-r ${theme.borderBase} ${theme.bgSidebar} flex flex-col shrink-0 z-20`}>
                <div className={`h-20 flex items-center px-8 border-b ${theme.borderBase}`}>
                  <Logo isDark={isDark} />
                </div>
                
                <div className="flex-1 overflow-y-auto py-8 px-6">
                  <p className={`text-[10px] font-bold ${theme.textMuted} uppercase tracking-[0.2em] mb-4`}>
                    Gestão {isDemoMode && <span className="text-amber-500 font-black animate-pulse">(DEMO)</span>}
                  </p>
                  <nav className="space-y-1.5">
                    <SidebarItem icon={LayoutDashboard} label="Painel de Controle" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} theme={theme} isDark={isDark} />
                    <SidebarItem icon={History} label="Histórico Financeiro" active={activeTab === 'records'} onClick={() => setActiveTab('records')} theme={theme} isDark={isDark} />
                    <SidebarItem icon={Users} label="Usuários e Moradores" active={activeTab === 'users'} onClick={() => setActiveTab('users')} theme={theme} isDark={isDark} />
                    <SidebarItem icon={CreditCard} label="Cartões RFID" active={activeTab === 'rfid'} onClick={() => setActiveTab('rfid')} theme={theme} isDark={isDark} />
                  </nav>
                </div>

                <div className={`p-6 border-t ${theme.borderBase}`}>
                   <button onClick={() => {setIsLoggedIn(false); setIsDemoMode(false);}} className={`flex w-full items-center gap-3 p-3 rounded-xl border ${theme.borderBase} ${isDark ? 'bg-zinc-900/40' : 'bg-white shadow-sm'} hover:border-red-500/30 hover:bg-red-500/5 transition-all group`}>
                      <LogOut size={14} className={`${theme.textMuted} group-hover:text-red-500 transition-colors`} />
                      <span className={`text-[11px] font-bold ${theme.textMain} group-hover:text-red-500 transition-colors`}>Sair do Sistema</span>
                   </button>
                </div>
              </aside>

              {/* MAIN CONTENT */}
              <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                {isDark && <div className="absolute top-0 right-0 w-[800px] h-[800px] bg-cyan-500/5 rounded-full blur-[120px] pointer-events-none"></div>}

                <header className={`h-20 border-b ${theme.borderBase} flex items-center justify-between px-10 ${isDark ? 'bg-[#09090b]/80' : 'bg-white/80'} backdrop-blur-md z-10 shrink-0 transition-colors duration-300`}>
                  <div className="flex items-center gap-4">
                    <h2 className={`text-lg font-bold ${theme.textMain} tracking-tight capitalize flex items-center gap-3`}>
                      {activeTab === 'dashboard' ? 'Painel de Controle' : 
                       activeTab === 'records' ? 'Histórico Financeiro' : 
                       activeTab === 'users' ? 'Diretório de Moradores' : 'Gestão de Acesso RFID'}
                       {isDemoMode && <span className="bg-amber-500/10 text-amber-500 border border-amber-500/20 text-[9px] font-black px-2 py-0.5 rounded-md tracking-widest uppercase">Modo Sandbox</span>}
                    </h2>
                  </div>
                  
                  <div className="flex items-center gap-4">
                    {activeTab === 'dashboard' && (
                      <div className={`${theme.inputBg} border ${theme.borderBase} rounded-xl px-4 py-2 flex items-center gap-3 w-64 transition-all focus-within:border-cyan-500/50`}>
                        <Search size={14} className={theme.textMuted} />
                        <input type="text" placeholder="Buscar Ponto..." className={`bg-transparent border-none outline-none text-xs w-full ${theme.textMain} placeholder-${isDark ? 'zinc-600' : 'zinc-400'}`} value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                      </div>
                    )}
                    
                    <button onClick={() => setIsDark(!isDark)} className={`p-2.5 rounded-full transition-colors ${theme.hoverBg} ${theme.textSub}`}>
                      {isDark ? <Sun size={16} /> : <Moon size={16} />}
                    </button>
                    <div className={`h-6 w-px ${theme.borderBase}`}></div>
                    <div className={ `flex items-center gap-3 cursor-pointer ${theme.hoverBg} p-1.5 pr-3 rounded-full transition-all border border-transparent hover:${theme.borderBase}` }>
                      <div className="w-8 h-8 rounded-full bg-cyan-500/10 text-cyan-500 flex items-center justify-center font-bold text-xs border border-cyan-500/20">JV</div>
                      <div className="text-left hidden md:block">
                        <p className={`text-[12px] font-bold ${theme.textMain} leading-none`}>Juan Volcanes</p>
                        <p className={`text-[10px] ${theme.textMuted} mt-0.5`}>{isDemoMode ? 'Demo User' : 'Admin'}</p>
                      </div>
                      <ChevronDown size={14} className={`${theme.textMuted} ml-1`} />
                    </div>
                  </div>
                </header>

                <div className="flex-1 overflow-auto p-10 z-10 custom-scrollbar relative">
                   {loading ? (
                       <div className="h-full flex items-center justify-center text-cyan-500 font-mono text-sm animate-pulse">
                           Sincronizando com a nuvem...
                       </div>
                   ) : (
                       <div className="animate-fade-in pb-10">
                           {activeTab === 'dashboard' && renderDashboard(data, theme, isDark, searchTerm)}
                           {activeTab === 'records' && renderRecords(data.records, theme, isDark)}
                           {activeTab === 'users' && renderUsers(data.usersList, theme, isDark)}
                           {activeTab === 'rfid' && renderRFID(data.rfids, theme, isDark)}
                       </div>
                   )}
                </div>
              </main>
            </div>
          );
        }

        // ==========================================
        // RENDERIZADORES DE VISTAS (TABS)
        // ==========================================

        function renderDashboard(data, theme, isDark, searchTerm) {
          const filteredChargers = data.chargers.filter(c => 
            c.id.toLowerCase().includes((searchTerm||'').toLowerCase()) || 
            (c.org_name && c.org_name.toLowerCase().includes((searchTerm||'').toLowerCase()))
          );

          return (
            <div className="space-y-8">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <MetricCard label="Receita Estimada" value={`R$ ${data.stats.total_revenue.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`} icon={DollarSign} color="text-emerald-400" theme={theme} isDark={isDark} />
                <MetricCard label="Energia Entregue" value={`${(data.stats.total_wh / 1000).toFixed(1)} kWh`} icon={Zap} color="text-[#00E5FF]" theme={theme} isDark={isDark} />
                <MetricCard label="Sessões Totais" value={data.stats.total_sessions} icon={TrendingUp} color="text-indigo-400" theme={theme} isDark={isDark} />
              </div>

              <div className={`${theme.bgCard} border ${theme.borderBase} rounded-2xl overflow-hidden shadow-sm flex flex-col`}>
                <div className={`px-6 py-4 border-b ${theme.borderBase} flex justify-between items-center bg-transparent shrink-0`}>
                  <h3 className={`text-sm font-bold ${theme.textMain}`}>Infraestrutura Conectada</h3>
                  <Badge icon={ShieldCheck} label="OCPP 1.6J" color="text-cyan-500" theme={theme} isDark={isDark} />
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse">
                    <thead className="sticky top-0 z-10">
                      <tr className={`${isDark ? 'bg-[#18181b]' : 'bg-zinc-50'} text-[11px] font-bold uppercase tracking-widest ${theme.textMuted} border-b ${theme.borderBase} shadow-sm`}>
                        <th className="px-6 py-4 font-semibold">Ponto / Localização</th>
                        <th className="px-6 py-4 font-semibold">Hardware</th>
                        <th className="px-6 py-4 font-semibold">Status Operacional</th>
                        <th className="px-6 py-4 font-semibold text-right">Último Sincronismo</th>
                      </tr>
                    </thead>
                    <tbody className={`divide-y ${theme.borderBase}`}>
                      {filteredChargers.map(c => (
                        <tr key={c.id} className={`${theme.hoverBg} transition-colors group`}>
                          <td className="px-6 py-4">
                            <div className="flex flex-col gap-1">
                              <span className={`font-mono font-bold text-sm ${isDark ? 'text-zinc-100' : 'text-zinc-900'}`}>{c.id}</span>
                              <span className={`text-xs ${theme.textMuted} flex items-center gap-1.5`}><Building2 size={12} /> {c.org_name || 'Modo Demonstração'}</span>
                            </div>
                          </td>
                          <td className="px-6 py-4">
                            <div className="flex flex-col gap-1">
                              <span className={`text-sm font-medium ${theme.textMain}`}>{c.model || 'Watio V1-Pro'}</span>
                              <span className={`text-xs ${theme.textMuted}`}>{c.vendor || 'WatioTech'}</span>
                            </div>
                          </td>
                          <td className="px-6 py-4"><StatusVisualizer status={c.status} isDark={isDark} /></td>
                          <td className="px-6 py-4 text-right">
                            <span className={`font-mono text-xs ${theme.textMuted}`}>
                              {new Date(c.last_heartbeat).toLocaleTimeString('pt-BR', { hour: '2-digit', minute:'2-digit', second:'2-digit' })}
                            </span>
                          </td>
                        </tr>
                      ))}
                      {filteredChargers.length === 0 && (
                        <tr><td colSpan="4" className="py-20 text-center"><p className={`text-sm font-medium ${theme.textMuted}`}>Nenhum ponto encontrado.</p></td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        }

        function renderRecords(records, theme, isDark) {
          return (
            <div className={`${theme.bgCard} border ${theme.borderBase} rounded-2xl overflow-hidden shadow-sm flex flex-col`}>
                <div className={`px-6 py-5 border-b ${theme.borderBase} flex justify-between items-center shrink-0`}>
                  <div className="flex items-center gap-3">
                    <div className="p-2 bg-cyan-500/10 rounded-lg"><History size={16} className="text-cyan-500" /></div>
                    <h3 className={`text-sm font-bold ${theme.textMain}`}>Livro Razão (Ledger Financeiro)</h3>
                  </div>
                  <button className={`flex items-center gap-2 px-3 py-1.5 bg-zinc-800 text-zinc-300 rounded-lg text-xs font-bold hover:bg-zinc-700 transition-colors border ${theme.borderBase}`}>
                    <DollarSign size={14} /> Exportar Relatório
                  </button>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse relative">
                    <thead className="sticky top-0 z-10">
                      <tr className={`${isDark ? 'bg-[#18181b]' : 'bg-zinc-50'} text-[11px] font-bold uppercase tracking-widest ${theme.textMuted} border-b ${theme.borderBase} shadow-sm`}>
                        <th className="px-6 py-4 font-semibold">Transação / Data</th>
                        <th className="px-6 py-4 font-semibold">Morador / Unidade</th>
                        <th className="px-6 py-4 font-semibold">Consumo (Energia)</th>
                        <th className="px-6 py-4 font-semibold text-right">Valor / Status</th>
                      </tr>
                    </thead>
                    <tbody className={`divide-y ${theme.borderBase}`}>
                      {records.map((s, i) => (
                        <tr key={i} className={`${theme.hoverBg} transition-colors`}>
                          <td className="px-6 py-4">
                            <div className="flex flex-col gap-1">
                              <span className="font-mono text-cyan-400 font-bold text-sm tracking-tight">{s.id}</span>
                              <span className={`text-[11px] ${theme.textMuted} font-semibold flex items-center gap-1.5`}><Clock size={10} /> {s.start}</span>
                            </div>
                          </td>
                          <td className="px-6 py-4">
                            <div className="flex flex-col gap-1">
                              <span className={`${theme.textMain} text-sm font-bold`}>{s.user}</span>
                              <span className={`text-[11px] ${theme.textMuted}`}>{s.unit}</span>
                            </div>
                          </td>
                          <td className="px-6 py-4">
                            <div className="flex flex-col gap-1">
                              <span className={`${theme.textMain} text-sm font-bold`}>{Number(s.kwh).toFixed(2)} kWh</span>
                              <span className={`text-[10px] ${theme.textMuted} font-semibold uppercase tracking-widest`}>Tempo: {s.duration}</span>
                            </div>
                          </td>
                          <td className="px-6 py-4 text-right">
                            <div className="flex flex-col items-end gap-1.5">
                              <span className={`font-mono text-[15px] font-black ${isDark ? 'text-emerald-400' : 'text-emerald-600'}`}>R$ {Number(s.amount).toFixed(2)}</span>
                              {s.status === 'PAID' ? (
                                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-emerald-500/10 border border-emerald-500/20 text-[9px] font-black text-emerald-500 uppercase tracking-widest"><CheckCircle2 size={10}/> Pago ({s.gateway})</span>
                              ) : s.status === 'FAILED' ? (
                                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-red-500/10 border border-red-500/20 text-[9px] font-black text-red-500 uppercase tracking-widest"><XCircle size={10}/> Recusado</span>
                              ) : (
                                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-amber-500/10 border border-amber-500/20 text-[9px] font-black text-amber-500 uppercase tracking-widest"><Clock size={10}/> Pendente</span>
                              )}
                            </div>
                          </td>
                        </tr>
                      ))}
                      {records.length === 0 && <tr><td colSpan="4" className="py-12 text-center text-zinc-500 text-sm">Nenhuma transação registrada.</td></tr>}
                    </tbody>
                  </table>
                </div>
            </div>
          );
        }

        function renderUsers(users, theme, isDark) {
          return (
            <div className={`${theme.bgCard} border ${theme.borderBase} rounded-2xl overflow-hidden shadow-sm flex flex-col`}>
                <div className={`px-6 py-5 border-b ${theme.borderBase} flex justify-between items-center shrink-0`}>
                  <div className="flex items-center gap-3">
                    <div className="p-2 bg-indigo-500/10 rounded-lg"><Users size={16} className="text-indigo-400" /></div>
                    <h3 className={`text-sm font-bold ${theme.textMain}`}>Diretório de Moradores</h3>
                  </div>
                  <button className={`flex items-center gap-2 px-4 py-1.5 bg-cyan-500 hover:bg-cyan-400 text-zinc-900 rounded-lg text-xs font-black transition-colors`}>
                    + Adicionar Morador
                  </button>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse relative">
                    <thead className="sticky top-0 z-10">
                      <tr className={`${isDark ? 'bg-[#18181b]' : 'bg-zinc-50'} text-[11px] font-bold uppercase tracking-widest ${theme.textMuted} border-b ${theme.borderBase} shadow-sm`}>
                        <th className="px-6 py-4 font-semibold">Nome / Contato</th>
                        <th className="px-6 py-4 font-semibold">Condomínio / Unidade</th>
                        <th className="px-6 py-4 font-semibold">Credenciais</th>
                        <th className="px-6 py-4 font-semibold text-right">Status / Saldo Devido</th>
                      </tr>
                    </thead>
                    <tbody className={`divide-y ${theme.borderBase}`}>
                      {users.map((u, i) => (
                        <tr key={i} className={`${theme.hoverBg} transition-colors`}>
                          <td className="px-6 py-4">
                            <div className="flex flex-col gap-1">
                              <span className={`${theme.textMain} text-sm font-bold`}>{u.name}</span>
                              <span className={`text-[11px] ${theme.textMuted}`}>{u.email}</span>
                            </div>
                          </td>
                          <td className="px-6 py-4">
                            <span className={`text-xs font-medium ${theme.textSub}`}>{u.unit}</span>
                          </td>
                          <td className="px-6 py-4">
                            <span className={`inline-flex items-center gap-1.5 px-2 py-1 rounded bg-zinc-800 border ${theme.borderBase} text-[10px] font-bold text-zinc-300 uppercase`}>
                              <CreditCard size={10} className="text-cyan-500"/> {u.rfids} Tags Ativas
                            </span>
                          </td>
                          <td className="px-6 py-4 text-right">
                            <div className="flex flex-col items-end gap-1.5">
                              {u.status === 'Active' ? (
                                 <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-emerald-500/10 border border-emerald-500/20 text-[9px] font-black text-emerald-500 uppercase tracking-widest">Ativo</span>
                              ) : (
                                 <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-red-500/10 border border-red-500/20 text-[9px] font-black text-red-500 uppercase tracking-widest">Bloqueado</span>
                              )}
                              <span className={`font-mono text-xs font-bold ${u.balance.includes('-') ? 'text-red-400' : u.balance !== 'R$ 0.00' ? 'text-emerald-400' : theme.textMuted}`}>{u.balance}</span>
                            </div>
                          </td>
                        </tr>
                      ))}
                      {users.length === 0 && <tr><td colSpan="4" className="py-12 text-center text-zinc-500 text-sm">Nenhum morador registrado.</td></tr>}
                    </tbody>
                  </table>
                </div>
            </div>
          );
        }

        function renderRFID(rfids, theme, isDark) {
          return (
            <div className={`${theme.bgCard} border ${theme.borderBase} rounded-2xl overflow-hidden shadow-sm flex flex-col`}>
                <div className={`px-6 py-5 border-b ${theme.borderBase} flex justify-between items-center shrink-0`}>
                  <div className="flex items-center gap-3">
                    <div className="p-2 bg-emerald-500/10 rounded-lg"><CreditCard size={16} className="text-emerald-500" /></div>
                    <h3 className={`text-sm font-bold ${theme.textMain}`}>Gestão de Acesso (Tags RFID)</h3>
                  </div>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse relative">
                    <thead className="sticky top-0 z-10">
                      <tr className={`${isDark ? 'bg-[#18181b]' : 'bg-zinc-50'} text-[11px] font-bold uppercase tracking-widest ${theme.textMuted} border-b ${theme.borderBase} shadow-sm`}>
                        <th className="px-6 py-4 font-semibold">Tag ID (Hex)</th>
                        <th className="px-6 py-4 font-semibold">Morador Vinculado</th>
                        <th className="px-6 py-4 font-semibold">Data de Registro</th>
                        <th className="px-6 py-4 font-semibold text-right">Status de Acesso</th>
                      </tr>
                    </thead>
                    <tbody className={`divide-y ${theme.borderBase}`}>
                      {rfids.map((r, i) => (
                        <tr key={i} className={`${theme.hoverBg} transition-colors`}>
                          <td className="px-6 py-4">
                            <div className="flex items-center gap-2">
                              <CreditCard size={14} className={`${r.status === 'Active' ? 'text-emerald-500' : 'text-zinc-500'} opacity-70`} />
                              <span className={`font-mono font-bold text-sm tracking-tight ${r.status === 'Active' ? 'text-emerald-400' : 'text-zinc-500'}`}>{r.tag}</span>
                            </div>
                          </td>
                          <td className="px-6 py-4">
                            <div className="flex flex-col gap-1">
                              <span className={`${theme.textMain} text-sm font-bold`}>{r.user}</span>
                            </div>
                          </td>
                          <td className="px-6 py-4">
                             <span className={`text-[11px] font-mono ${theme.textMuted}`}>{r.assigned}</span>
                          </td>
                          <td className="px-6 py-4 text-right">
                            {r.status === 'Active' ? (
                              <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded bg-emerald-500/10 border border-emerald-500/20 text-[9px] font-black text-emerald-500 uppercase tracking-widest">Autorizado</span>
                            ) : r.status === 'Revoked' ? (
                              <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded bg-red-500/10 border border-red-500/20 text-[9px] font-black text-red-500 uppercase tracking-widest"><XCircle size={10}/> Revogado</span>
                            ) : (
                              <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded bg-amber-500/10 border border-amber-500/20 text-[9px] font-black text-amber-500 uppercase tracking-widest"><AlertTriangle size={10}/> Perdido</span>
                            )}
                          </td>
                        </tr>
                      ))}
                      {rfids.length === 0 && <tr><td colSpan="4" className="py-12 text-center text-zinc-500 text-sm">Nenhuma tag cadastrada.</td></tr>}
                    </tbody>
                  </table>
                </div>
            </div>
          );
        }

        // ==========================================
        // COMPONENTES DE UI MENORES
        // ==========================================
        function Logo({ isDark }) {
          return (
            <svg viewBox="0 0 120 40" className="h-8 select-none" xmlns="http://www.w3.org/2000/svg">
              <style>{`.watio-logo-text { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 34px; letter-spacing: -0.06em; fill: ${isDark ? '#ffffff' : '#09090b'}; }`}</style>
              <text x="0" y="32" className="watio-logo-text">Watio</text>
              <rect x="52" y="16" width="16" height="5" fill="#00E5FF" rx="0.5" />
            </svg>
          );
        }

        function LoginScreen({ setEmail, onLogin }) {
          return (
            <div className="min-h-screen bg-[#09090b] flex items-center justify-center p-6 relative overflow-hidden">
              <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-cyan-500/10 rounded-full blur-[120px] pointer-events-none"></div>
              <div className="max-w-sm w-full animate-fade-in relative z-10">
                <div className="text-center mb-10">
                  <div className="flex justify-center mb-6 scale-125"><Logo isDark={true} /></div>
                  <p className="text-zinc-500 text-xs font-semibold tracking-widest uppercase">Mission Control</p>
                </div>
                <form onSubmit={onLogin} className="bg-[#18181b] border border-zinc-800/80 p-8 rounded-2xl shadow-2xl backdrop-blur-xl">
                  <div className="mb-5">
                    <label className="block text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-2">E-mail</label>
                    <input type="email" placeholder="demo@watio.br" className="w-full bg-[#09090b] border border-zinc-800 rounded-xl py-3 px-4 text-white text-sm outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all placeholder:text-zinc-600" required onChange={(e) => setEmail(e.target.value)} />
                  </div>
                  <div className="mb-8">
                    <label className="block text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-2">Senha</label>
                    <input type="password" placeholder="••••••••" className="w-full bg-[#09090b] border border-zinc-800 rounded-xl py-3 px-4 text-white text-sm outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all placeholder:text-zinc-600" required />
                  </div>
                  <button type="submit" className="w-full bg-[#00E5FF] hover:bg-cyan-400 text-[#09090b] font-black py-3.5 rounded-xl shadow-[0_0_20px_rgba(0,229,255,0.15)] transition-all active:scale-[0.98] text-sm tracking-wide">
                    Acessar Sistema
                  </button>
                </form>
              </div>
            </div>
          );
        }

        function SidebarItem({ icon: Icon, label, active, onClick, theme, isDark }) {
          return (
            <div 
              onClick={onClick}
              className={`flex items-center justify-between px-4 py-3 rounded-xl text-[13px] font-bold cursor-pointer transition-all group border ${
                active 
                ? `bg-[#00E5FF]/10 text-[#00E5FF] border-[#00E5FF]/30 shadow-[0_0_15px_rgba(0,229,255,0.1)]` 
                : `${theme.textMuted} border-transparent ${theme.hoverBg} hover:${isDark ? 'text-zinc-200' : 'text-zinc-900'}`
              }`}
            >
              <div className="flex items-center gap-3">
                <Icon size={18} className={active ? 'text-[#00E5FF]' : 'opacity-60 group-hover:opacity-100 transition-opacity'} /> 
                {label}
              </div>
              {active && <div className={`w-1.5 h-1.5 rounded-full bg-[#00E5FF] shadow-[0_0_8px_rgba(0,229,255,1)]`}></div>}
            </div>
          );
        }

        function MetricCard({ label, value, icon: Icon, color, theme, isDark }) {
          return (
            <div className={`${theme.bgCard} border ${theme.borderBase} p-6 rounded-2xl flex items-start justify-between shadow-sm hover:shadow-md transition-shadow`}>
              <div>
                <p className={`text-[11px] font-bold uppercase tracking-widest ${theme.textMuted} mb-2`}>{label}</p>
                <p className={`text-3xl font-black ${theme.textMain} tracking-tight font-mono`}>{value}</p>
              </div>
              <div className={`p-3 rounded-xl ${isDark ? 'bg-zinc-800/50 border border-zinc-700' : 'bg-zinc-100 border border-zinc-200'}`}>
                <Icon size={20} className={color} />
              </div>
            </div>
          );
        }

        function Badge({ icon: Icon, label, color, theme, isDark }) {
          return (
            <div className={`flex items-center gap-1.5 px-2.5 py-1 ${isDark ? 'bg-cyan-500/10' : 'bg-cyan-50'} border ${isDark ? 'border-cyan-500/20' : 'border-cyan-200'} rounded-md text-[10px] font-bold uppercase tracking-widest`}>
              <Icon size={12} className={color} />
              <span className={color}>{label}</span>
            </div>
          );
        }

        function StatusVisualizer({ status, isDark }) {
          const isCharging = ['Charging', 'Occupied'].includes(status);
          const isFaulted = ['Faulted', 'Unavailable'].includes(status);
          
          const colorClass = isCharging ? 'amber' : isFaulted ? 'red' : 'emerald';
          const label = isCharging ? 'Em Uso' : isFaulted ? 'Com Falha' : 'Disponível';
          
          return (
            <div className="flex flex-col gap-2 w-full max-w-[180px]">
              <div className="flex justify-between items-center text-xs font-semibold">
                <span className={`text-${colorClass}-500 flex items-center gap-1.5`}>
                  <span className={`w-1.5 h-1.5 rounded-full bg-${colorClass}-500 ${isCharging ? 'animate-pulse' : ''}`}></span> 
                  {label}
                </span>
                {isCharging && <span className={`${isDark ? 'text-zinc-400' : 'text-zinc-500'} font-mono text-[10px]`}>11.4 kW</span>}
              </div>
              {isCharging && (
                <div className={`w-full ${isDark ? 'bg-zinc-800' : 'bg-zinc-200'} rounded-full h-1.5 overflow-hidden`}>
                  <div className={`bg-${colorClass}-500 h-full rounded-full transition-all duration-1000 w-[65%]`}></div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
